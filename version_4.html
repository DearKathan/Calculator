<!DOCTYPE html> 
<html>
  <head>
    <title>Calculator Project Version 5</title>
    <link rel="stylesheet" href="style/version_4.css"></link>
  </head>
  <body>
    <p>Calculator</p>
    <p class="js-calculation calculation"></p>
    <p>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(1);
        ">1</button>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(2);
        ">2</button>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(3);
        ">3</button>
      <button class="calculator-button yellow-button" onclick="
        updateCalculation(' + ');
        ">+</button>
      </p>

      <p>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(4);
        ">4</button>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(5);
        ">5</button>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(6);
        ">6</button>
      <button class="calculator-button yellow-button" onclick="
        updateCalculation(' - ');
        ">-</button>
      </p>

      <p>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(7);
        ">7</button>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(8);
        ">8</button>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(9);
        ">9</button>
      <button class="calculator-button yellow-button" onclick="
        updateCalculation(' * ');
        ">*</button>
      </p>

      <p>
      <button class="calculator-button gray-button" onclick="
        updateCalculation(0);;
        ">0</button>
      <button class="calculator-button gray-button" onclick="
        updateCalculation('.');
        ">.</button>
      <button class="calculator-button gray-button" onclick="
        calculation = eval(calculation);
        displayCalculation();
        localStorage.setItem('calculation', calculation);
        ">=</button>
      <button class="calculator-button yellow-button" onclick="
        updateCalculation(' / ');
        ">/</button>
      </p>

      <p>
        <button class="calculator-button gray-button clear-button" onclick="
          calculation = '';
          displayCalculation();
          localStorage.setItem('calculation', calculation);
          ">Clear</button>
      </p>

    <script src="script/version_4.js">
    </script>
  </body>
</html>
